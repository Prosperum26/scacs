# Render Blueprint — SCACS Backend API
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: scacs-api
    runtime: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_EXPIRY
        value: 7d
      - key: QR_TOKEN_EXPIRY_SEC
        value: "60"
      - key: DEFAULT_GATE
        value: Main Gate
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
